<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Performance Predictor</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e3f2fd, #f0f9ff);
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 850px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        backdrop-filter: blur(8px);
    }

    h1 {
        text-align: center;
        color: #1565c0;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
    }

    label {
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #2196f3;
        box-shadow: 0 0 6px rgba(33,150,243,0.4);
        outline: none;
    }

    .error {
        color: red;
        font-size: 12px;
    }

    .full {
        grid-column: span 2;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2196f3, #1e88e5);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(135deg, #1e88e5, #1565c0);
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .result {
        margin-top: 25px;
        text-align: center;
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        padding: 18px;
        border-radius: 12px;
        font-size: 20px;
        color: #0d47a1;
        font-weight: bold;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }
</style>

<script>
function validateForm() {
    let g1 = document.getElementById("G1").value;
    let g2 = document.getElementById("G2").value;

    let valid = true;

    if (g1 < 0 || g1 > 20) {
        document.getElementById("g1_error").innerText = "Enter value between 0-20";
        valid = false;
    } else {
        document.getElementById("g1_error").innerText = "";
    }

    if (g2 < 0 || g2 > 20) {
        document.getElementById("g2_error").innerText = "Enter value between 0-20";
        valid = false;
    } else {
        document.getElementById("g2_error").innerText = "";
    }

    return valid;
}
</script>

</head>

<body>

<div class="container">

<h1>🎓 Student Performance Predictor</h1>

<form method="POST" onsubmit="return validateForm()">

<div class="grid">

<!-- G1 -->
<div>
<label>G1 (MST 1 /20)</label>
<input type="number" id="G1" name="G1" required>
<div id="g1_error" class="error"></div>
</div>

<!-- G2 -->
<div>
<label>G2 (MST 2 /20)</label>
<input type="number" id="G2" name="G2" required>
<div id="g2_error" class="error"></div>
</div>

<!-- Study Time -->
<div>
<label>Study Time</label>
<select name="studytime">
<option value="1">Less than 2 hrs</option>
<option value="2">2–4 hrs</option>
<option value="3">4–6 hrs</option>
<option value="4">7–9 hrs</option>
<option value="5">More than 10 hrs</option>
</select>
</div>

<!-- Absences -->
<div>
<label>Absences</label>
<select name="absences">
<option value="0">0–2 days</option>
<option value="3">3–5 days</option>
<option value="6">6–10 days</option>
<option value="10">More than 10 days</option>
</select>
</div>

<!-- Failures -->
<div>
<label>Past Failures</label>
<select name="failures">
<option value="0">None</option>
<option value="1">1 time</option>
<option value="2">2 times</option>
<option value="3">3+ times</option>
</select>
</div>

<!-- Sleep -->
<div>
<label>Sleep Hours</label>
<select name="sleep_hours">
<option value="5">Less than 5 hrs</option>
<option value="6">5–6 hrs</option>
<option value="7">6–7 hrs</option>
<option value="8">7–8 hrs</option>
<option value="9">More than 8 hrs</option>
</select>
</div>

<!-- Social Media -->
<div>
<label>Social Media Usage</label>
<select name="social_media">
<option value="1">Less than 1 hr</option>
<option value="2">1–2 hrs</option>
<option value="3">2–4 hrs</option>
<option value="4">4–5 hrs</option>
<option value="5">More than 5 hrs</option>
</select>
</div>

<!-- Mother Edu -->
<div>
<label>Mother Education</label>
<select name="Medu">
<option value="0">No Education</option>
<option value="1">Primary</option>
<option value="2">High School</option>
<option value="3">Graduate</option>
<option value="4">Postgraduate</option>
</select>
</div>

<!-- Father Edu -->
<div>
<label>Father Education</label>
<select name="Fedu">
<option value="0">No Education</option>
<option value="1">Primary</option>
<option value="2">High School</option>
<option value="3">Graduate</option>
<option value="4">Postgraduate</option>
</select>
</div>

<!-- Family -->
<div>
<label>Family Relationship (1–5)</label>
<input type="number" name="famrel" min="1" max="5">
</div>

<!-- Internet -->
<div>
<label>Internet Access</label>
<select name="internet">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<!-- Higher -->
<div>
<label>Higher Education</label>
<select name="higher">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="full">
<button type="submit">🚀 Predict Final Score</button>
</div>

</div>

</form>

{% if results %}
<div class="result">
📊 Predicted Final Score (G3): {{ results }}
</div>
{% endif %}

</div>

</body>
</html>
